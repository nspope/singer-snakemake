# --- debug_config.yaml ---
input-dir: "example" # directory with input files per chromosome, see README
output-dir: "results" # directory where to place output
chromosomes: null # a list of chromosomes to use (e.g. "chr1"), if `null` use all `vcf.gz` in `input-dir`
mutation-rate: 1.0e-8 # per base per generation mutation rate
recombination-rate: 1.0e-8 # per base per generation recombination rate, ignored if `hapmap` is present
polarised: false # are variants polarised so that the reference state is ancestral, ignored if `ancestral.fa.gz` is present
stratify-by: "population" # column in metadata to use for population table in tree sequence (or `null`)
random-seed: 1 # random seed
# --- discretization options ---
max-chunk-size: 1.0e6 # target size in base pairs for each chunk run through SINGER
min-chunk-size: 0.1e6 # discard chunks smaller than this (e.g. isolated between gaps)
min-gap-size: 1.0e6 # minimum size in base pairs for a masked interval to be converted to a gap
max-missing: 0.75 # ignore chunks with more than this proportion of masked sequence or filtered variants
min-sites: 500 # ignore chunks with fewer than this number of accessible polymorphic sites
min-branch-length: 1.0e-7 # minimum possible branch length in generations in tree sequence
max-masked-samples: 10 # maximum masked samples for interval to be kept if sample masks are provided (FIXME: hidden)
# --- SINGER options ---
singer-mcmc-samples: 10 # number of MCMC samples (each sample is a tree sequence)
singer-mcmc-thin: 10 # thinning interval between MCMC samples
singer-mcmc-burnin: 0.5 # proportion of initial samples discarded when computing plots of statistics
singer-mcmc-resumes: 1000 # maximum number of times to try to resume MCMC on error
singer-skip-failures: true # treat chunks where MCMC fails as missing
# --- POLEGON options ---
polegon-mcmc-samples: 100 # number of MCMC samples for POLEGON dating
polegon-mcmc-thin: 10 # thinning interval between MCMC samples for POLEGON dating
polegon-mcmc-burnin: 0.5 # proportion of initial samples trimmed from posterior mean for POLEGON dating
polegon-scaling-reps: 5 # number of timescale rescaling reps after MCMC sampling for POLEGON dating
polegon-max-step: 10.0 # step size used in proposal for POLEGON dating
# --- summary statistics ---
stats-time-grid: [1, 7, 25]  # [log10 start, log10 stop, number of intervals] for coalescence rates, etc
stats-window-size: 5.0e4 # size of genomic windows in base pairs for comparing expected vs observed
paircoal-recombination-weights: true # average coalescing pairs over recombination map rather than base pairs (FIXME: hidden)
# --- misc debugging options ---
model-masked-sequence: true # build fine-scale mu rate map with zero rate in masked intervals; if false, fold inaccessible proportion into a global rate
random-polarisation: true # randomly flip ref/alt for unpolarised sites at initialisation
remove-unpolarised: false # if `polarised: true`, drop sites that could not be polarised instead of carrying them through
impute-sample-masks: true # when per-sample masks are present, fill masked genotypes via Bernoulli draws from observed allele frequency
use-polegon: true # run POLEGON for dating; if false, retain SINGER's branch lengths
use-mutational-span: true # convert edge spans to mutational units so POLEGON's mean-rate rescaling yields correct dates
drop-omitted: true # drop user-specified omitted positions from POLEGON dating (kept in topology)
skip-node-masks: false # skip per-sample node mask handling in run_polegon (do not adjust edge spans for partial ancestry)
remove-polegon-inputs: true # delete the temporary POLEGON input text files after the run; set false to inspect
repolarise-ancestral-state: true # absorb above-root mutations and flip ancestral state at affected sites
delete-genealogical-gaps: true # remove masked intervals not spanned by any edge from the merged tree sequence
delete-masked-intervals: false # remove all masked intervals from the merged tree sequence
delete-imputed-intervals: true # remove per-sample masked ancestry from the merged tree sequence
record-chunk-provenance: true # record per-chunk SINGER/POLEGON parameters in the tree sequence provenance table
coalrate-tail-cutoff: 0.05 # mask coalescence rate estimates for time bins with survival proportion below this threshold
#singer-binary: "/path/to/singer" # override the bundled SINGER binary
#polegon-binary: "/path/to/polegon" # override the bundled POLEGON binary
